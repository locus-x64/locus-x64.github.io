---
layout: default
---

<section class="page-title-block">
  <p class="kicker">Tag Console</p>
  <h1>{{ page.title }}</h1>
  <p class="muted">Filter posts by topic without leaving the page.</p>
</section>

<section class="tags-filter" data-tags-filter>
  <button class="tag active" type="button" data-tag="all">all</button>
  {% assign all_tags = site.tags | sort %}
  {% for item in all_tags %}
    <button class="tag" id="{{ item[0] | slugify }}" type="button" data-tag="{{ item[0] | downcase }}">
      {{ item[0] }} ({{ item[1].size }})
    </button>
  {% endfor %}
</section>

<section class="cards-grid" data-tag-results>
  {% for post in site.posts %}
    {% include post-card.html %}
  {% endfor %}
</section>
