<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <link rel="shortcut icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}" />
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    {% seo %}
    <script>
      (function () {
        var preferred = localStorage.getItem('theme');
        if (!preferred) {
          preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', preferred);
      })();
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9885194547171466" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    {% include nav.html %}
    <main class="container page-shell">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/toc.js' | relative_url }}" defer></script>
    {% include google-analytics.html %}
  </body>
</html>
