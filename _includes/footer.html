<footer class="site-footer">
  <div class="container footer-wrap">
    <p>Built by {{ site.author }} · {{ 'now' | date: '%Y' }}</p>
    <div class="footer-links">
      {% for item in site.data.social %}
        {% if item.url contains 'http' or item.url contains 'mailto:' %}
          <a href="{{ item.url }}" {% if item.url contains 'http' %}target="_blank" rel="noopener noreferrer"{% endif %}>{{ item.name }}</a>
        {% else %}
          <a href="{{ item.url | relative_url }}">{{ item.name }}</a>
        {% endif %}
      {% endfor %}
    </div>
  </div>
</footer>
