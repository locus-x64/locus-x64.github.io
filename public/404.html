<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const path = window.location.pathname + window.location.search
        const redirect = `/?p=${encodeURIComponent(path)}`
        window.location.replace(`${window.location.origin}${redirect}${window.location.hash}`)
      })()
    </script>
  </head>
  <body></body>
</html>
