        <script>
            (function () {
                const redirect = new URLSearchParams(window.location.search).get('p')
                if (!redirect) return

                const restoredPath = decodeURIComponent(redirect)
                const newUrl = `${window.location.origin}${restoredPath}${window.location.hash}`
                window.history.replaceState(null, '', newUrl)
            })()
        </script>
